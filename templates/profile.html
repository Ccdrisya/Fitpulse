<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - FitPulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-page">
    <nav class="navbar dashboard-nav">
        <div class="nav-brand">
            <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
            <span class="brand-name">FitPulse</span>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="nav-link">Home</a>
            <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('data_entry') }}" class="nav-link">Add Data</a>
            <a href="{{ url_for('profile') }}" class="nav-link active">Profile</a>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="snapshot-card" style="max-width: 600px; margin: 0 auto;">
            <h2>User Profile</h2>
            <p style="color:var(--text-muted);">Manage your account details</p>
            
            <form method="POST" style="margin-top: 2rem;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" value="{{ user.username }}" disabled style="background:var(--bg-elevated); border:none; color:var(--text-muted);">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ user.email }}" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" value="{{ user.age }}">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="Male" {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if user.gender == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary">Update Profile</button>
            </form>
            
            <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <p>Total Records: <strong>{{ stats.total_entries }}</strong></p>
            </div>
        </div>
    </main>
</body>
</html>
